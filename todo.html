<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <div class="header">
        <h1>To-Do List</h1>
    </div>
    <div class="items">
        <h2>Add Items 📝</h2>
        <input id="input">
        <button onclick="add()" id="submitBtn">Submit</button>

    </div>
    <div class="task">
        <h2 id="tasks">Tasks ✅</h2>
        <ul id="content">
            <li>Wake Up
               <button onclick="deleteItem(event)" id="deleteBtn">Delete</button>
            </li>
        
        </ul>
    </div>

    <script src="todo.js"></script>
</body>
</html>
